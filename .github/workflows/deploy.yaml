name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ">=24"
          cache: pnpm
      - uses: actions/cache@v6
        with:
          path: packages/docs/.vitepress/cache
          key: ${{ runner.os }}-vitepress-${{ hashFiles('packages/docs/**', 'package-lock.json', 'pnpm-lock.yaml', 'yarn.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-vitepress-
      - uses: actions/configure-pages@v6
      - run: pnpm install
      - run: pnpm --filter @moniq/docs run predocs
      - run: pnpm --filter @moniq/docs run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: packages/docs/.vitepress/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
